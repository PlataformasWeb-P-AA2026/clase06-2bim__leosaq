<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Dirección</title>
</head>
<body>
    <h1>Crear Dirección</h1>
    <form method="POST">
        <label for="tipo">Tipo:</label>
        <input type="text" id="tipo" name="tipo" required>
        <br><br>
        <label for="descripcion">Descripción:</label>
        <input type="text" id="descripcion" name="descripcion" required>
        <br><br>
        <label for="estudiante">Estudiante:</label>
        <select id="estudiante" name="estudiante" required>
            <option value="">Seleccione un estudiante</option>
            {% for estudiante in estudiantes %}
                <option value="{{ estudiante.url }}">{{ estudiante.nombre }} {{ estudiante.apellido }}</option>
            {% endfor %}
        </select>
        <br><br>
        <button type="submit">Crear Dirección</button>
    </form>
</body>
</html>
